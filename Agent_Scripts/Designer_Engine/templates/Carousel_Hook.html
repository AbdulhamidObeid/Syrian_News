<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Hook Template</title>
    <!-- Dummy bullet template to satisfy generate_post.js -->
    <meta id="bullet-template-dots" content="PGRpdiBjbGFzcz0iaGlkZGVuIj48L2Rpdj4=">
    <!-- Official Font: IBM Plex Sans Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/textfit/2.4.0/textFit.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['IBM Plex Sans Arabic', 'sans-serif'] } } }
        }
    </script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 1080px; height: 1350px; overflow: hidden;
            background-color: transparent;
            background-image: url('file:///Users/obeid/Desktop/Antigravity-Hub/Projects/Syrian_News/Assets/Templates/1080x1350_white.jpg');
            background-size: cover; background-position: center;
        }

        #content-sandbox {
            position: absolute;
            left: 116.564345319945px; top: 206.76266963083003px; width: 846.871309360111px; height: 977.660305721281px;
        }
    </style>
</head>
<body class="antialiased">
    <div id="content-sandbox" dir="rtl" class="flex flex-col justify-between" style="gap: 24px;">
        
        <!-- ZONE 1: Typographic Hero -->
        <div class="w-full flex-none flex flex-col justify-end items-center" id="headline-zone">
            
            <div class="flex items-center gap-6 mb-6">
                <div class="h-[4px] w-16" style="background-color: #0d9488"></div>
                <span class="font-medium tracking-widest text-4xl uppercase whitespace-nowrap" style="color: #0d9488;">__SUB_HEADLINE__</span>
                <div class="h-[4px] w-16" style="background-color: #0d9488"></div>
            </div>
            
            <div class="w-full">
                <!-- Using larger text for the hook. We rely on the replacement string for font weights. -->
                <h1 class="text-slate-900 text-center leading-[1.4] text-[75px]" id="main-headline" style="text-wrap: balance;">
                    __MAIN_HEADLINE__
                </h1>
            </div>
        </div>

        <!-- ZONE 2: Visual Anchor -->
        <!-- Flex-1 makes it absorb all the rest of the space down to the bottom of the safe zone -->
        <div class="w-full relative overflow-hidden rounded-[2rem] border-2 border-black/10 flex-1 shadow-2xl">
            <img src="__MAIN_IMAGE_URL__" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute inset-0 ring-2 ring-inset ring-black/10 rounded-[2rem]"></div>
        </div>
    </div>
</body>
</html>
