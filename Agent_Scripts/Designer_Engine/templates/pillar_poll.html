<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillar: Poll — رأيك يهمنا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['IBM Plex Sans Arabic', 'sans-serif'] } } }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 1080px; height: 1350px; overflow: hidden;
            background-color: transparent;
            background-image: url('file:///Users/obeid/Desktop/Antigravity-Hub/Projects/Syrian_News/Assets/Templates/1080x1350_white.jpg');
            background-size: cover; background-position: center;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        /* Safe zone: left:116 top:206 width:847 height:978 */
        #content-sandbox {
            position: absolute;
            left: 116px; top: 206px; width: 847px; height: 978px;
            display: flex;
            flex-direction: column;
        }
        .poll-badge {
            background: #C93D57;
            color: #FFFFFF;
            padding: 10px 32px;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(201,61,87,0.30);
        }
        .question-block {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 24px;
            padding: 40px 44px;
            flex-shrink: 0;
        }
        .question-text {
            font-size: 44px;
            font-weight: 800;
            color: #0D1117;
            line-height: 1.35;
            text-align: center;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }
        .poll-option {
            background: rgba(255,255,255,0.68);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0,0,0,0.06);
            border-radius: 20px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            transition: all 0.2s ease;
        }
        .option-letter {
            font-size: 20px;
            font-weight: 800;
            color: #56A596;
            background: rgba(86,165,150,0.12);
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .option-text {
            font-size: 26px;
            font-weight: 600;
            color: #161616;
            line-height: 1.3;
        }
        .cta-line {
            font-size: 24px;
            color: #56A596;
            font-weight: 600;
            text-align: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="content-sandbox">
        <!-- Badge -->
        <div style="display:flex; justify-content:center; flex-shrink:0; margin-bottom:22px;">
            <div class="poll-badge">
                <span>🗳️</span>
                <span>رأيك يهمنا</span>
            </div>
        </div>

        <!-- Question card -->
        <div class="question-block" style="margin-bottom:20px;">
            <div class="question-text">__POLL_QUESTION__</div>
        </div>

        <!-- Options grid — fills remaining space -->
        <div class="options-grid" style="margin-bottom:20px;">
            <div class="poll-option">
                <div class="option-letter">أ</div>
                <div class="option-text">__OPTION_A__</div>
            </div>
            <div class="poll-option">
                <div class="option-letter">ب</div>
                <div class="option-text">__OPTION_B__</div>
            </div>
            <div class="poll-option">
                <div class="option-letter">ج</div>
                <div class="option-text">__OPTION_C__</div>
            </div>
            <div class="poll-option">
                <div class="option-letter">د</div>
                <div class="option-text">__OPTION_D__</div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cta-line">شاركنا رأيك في التعليقات 👇</div>
    </div>
</body>
</html>
