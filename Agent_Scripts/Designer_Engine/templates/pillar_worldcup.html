<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillar: World Cup 2026 — مونديال 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['IBM Plex Sans Arabic', 'sans-serif'] } } }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 1080px; height: 1350px; overflow: hidden;
            background-color: transparent;
            background-image: url('file:///Users/obeid/Desktop/Antigravity-Hub/Projects/Syrian_News/Assets/Templates/1080x1350_white.jpg');
            background-size: cover; background-position: center;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        /* Safe zone: left:116 top:206 width:847 height:978 */
        #content-sandbox {
            position: absolute;
            left: 116px; top: 206px; width: 847px; height: 978px;
            display: flex;
            flex-direction: column;
        }
        .wc-badge {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #DBBE8F;
            padding: 10px 32px;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.04em;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            box-shadow: 0 4px 24px rgba(26,26,46,0.30);
        }
        .match-headline {
            font-size: 40px;
            font-weight: 800;
            color: #0D1117;
            line-height: 1.3;
            text-align: center;
            flex-shrink: 0;
        }
        .hero-image {
            width: 100%;
            flex: 1;
            min-height: 0;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
            position: relative;
        }
        .hero-image img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .hero-image .overlay {
            position: absolute; inset: 0;
            border-radius: 24px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
        }
        .score-card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 24px;
            padding: 28px 36px;
            flex-shrink: 0;
        }
        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            margin-bottom: 12px;
        }
        .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }
        .team-name {
            font-size: 30px;
            font-weight: 700;
            color: #161616;
            text-align: center;
            line-height: 1.2;
        }
        .score-display {
            font-size: 72px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1;
            letter-spacing: -0.03em;
        }
        .vs-divider {
            font-size: 32px;
            font-weight: 600;
            color: #C93D57;
            flex-shrink: 0;
        }
        .match-info {
            font-size: 20px;
            color: #6B7280;
            font-weight: 500;
            text-align: center;
        }
        .bullets-area {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="content-sandbox">
        <!-- Badge -->
        <div style="display:flex; justify-content:center; flex-shrink:0; margin-bottom:20px;">
            <div class="wc-badge">
                <span>⚽</span>
                <span>مونديال 2026</span>
            </div>
        </div>

        <!-- Match headline -->
        <div class="match-headline" style="margin-bottom:18px;">__MAIN_HEADLINE__</div>

        <!-- Hero image — grows to fill -->
        <div class="hero-image" style="margin-bottom:18px;">
            <img src="__MAIN_IMAGE_URL__" />
            <div class="overlay"></div>
        </div>

        <!-- Score card -->
        <div class="score-card" style="margin-bottom:16px;">
            <div class="score-row">
                <div class="team-block">
                    <div class="team-name">__TEAM_1__</div>
                    <div class="score-display">__SCORE_1__</div>
                </div>
                <div class="vs-divider">—</div>
                <div class="team-block">
                    <div class="team-name">__TEAM_2__</div>
                    <div class="score-display">__SCORE_2__</div>
                </div>
            </div>
            <div class="match-info">__MATCH_INFO__</div>
        </div>

        <!-- Bullets area -->
        <div class="bullets-area" id="bento-container">
            __BULLETS_HTML__
        </div>
    </div>
</body>
</html>
