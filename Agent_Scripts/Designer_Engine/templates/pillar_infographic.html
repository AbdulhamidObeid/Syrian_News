<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillar: Infographic — إنفوغرافيك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['IBM Plex Sans Arabic', 'sans-serif'] } } }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 1080px; height: 1350px; overflow: hidden;
            background-color: transparent;
            background-image: url('file:///Users/obeid/Desktop/Antigravity-Hub/Projects/Syrian_News/Assets/Templates/1080x1350_white.jpg');
            background-size: cover; background-position: center;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        /* Safe zone: left:116 top:206 width:847 height:978 */
        #content-sandbox {
            position: absolute;
            left: 116px; top: 206px; width: 847px; height: 978px;
            display: flex;
            flex-direction: column;
        }
        .infographic-badge {
            background: #002D29;
            color: #56A596;
            padding: 10px 32px;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,45,41,0.25);
        }
        .title-block {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 20px;
            padding: 28px 36px;
            flex-shrink: 0;
        }
        .main-headline {
            font-size: 40px;
            font-weight: 800;
            color: #0D1117;
            line-height: 1.3;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub-headline {
            font-size: 20px;
            font-weight: 500;
            color: #6B7280;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.68);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 20px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #56A596, #002D29);
            border-radius: 20px 20px 0 0;
        }
        .stat-number {
            font-size: 56px;
            font-weight: 800;
            color: #002D29;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .stat-unit {
            font-size: 22px;
            color: #56A596;
            font-weight: 700;
        }
        .stat-label {
            font-size: 18px;
            color: #6B7280;
            font-weight: 500;
            line-height: 1.3;
        }
        .source-line {
            font-size: 18px;
            color: #9CA3AF;
            font-weight: 500;
            text-align: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="content-sandbox">
        <!-- Badge -->
        <div style="display:flex; justify-content:center; flex-shrink:0; margin-bottom:20px;">
            <div class="infographic-badge">
                <span>📊</span>
                <span>إنفوغرافيك</span>
            </div>
        </div>

        <!-- Title block -->
        <div class="title-block" style="margin-bottom:18px;">
            <div class="main-headline">__MAIN_HEADLINE__</div>
            <div class="sub-headline">__SUB_HEADLINE__</div>
        </div>

        <!-- Stats grid — fills remaining height -->
        <div class="stats-grid" style="margin-bottom:18px;">
            <div class="stat-card">
                <div class="stat-number">__STAT_1_VALUE__</div>
                <div class="stat-unit">__STAT_1_UNIT__</div>
                <div class="stat-label">__STAT_1_LABEL__</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">__STAT_2_VALUE__</div>
                <div class="stat-unit">__STAT_2_UNIT__</div>
                <div class="stat-label">__STAT_2_LABEL__</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">__STAT_3_VALUE__</div>
                <div class="stat-unit">__STAT_3_UNIT__</div>
                <div class="stat-label">__STAT_3_LABEL__</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">__STAT_4_VALUE__</div>
                <div class="stat-unit">__STAT_4_UNIT__</div>
                <div class="stat-label">__STAT_4_LABEL__</div>
            </div>
        </div>

        <!-- Source -->
        <div class="source-line">__SOURCE_TEXT__</div>
    </div>
</body>
</html>
