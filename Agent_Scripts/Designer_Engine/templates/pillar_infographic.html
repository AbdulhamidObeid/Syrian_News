<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillar: Infographic — إنفوغرافيك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['IBM Plex Sans Arabic', 'sans-serif'] } } }
        }
    </script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 1080px; height: 1350px; overflow: hidden;
            background-color: transparent;
            background-image: url('file:///Users/obeid/Desktop/Antigravity-Hub/Projects/Syrian_News/Assets/Templates/1080x1350_white.jpg');
            background-size: cover; background-position: center;
        }
        #content-sandbox {
            position: absolute;
            left: 116px; top: 206px; width: 847px; height: 978px;
        }
        .infographic-badge {
            background: #002D29;
            color: #56A596;
            padding: 10px 28px;
            border-radius: 999px;
            font-size: 22px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .stat-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 48px;
            font-weight: 800;
            color: #002D29;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .stat-label {
            font-size: 18px;
            color: #666;
            font-weight: 500;
            margin-top: 8px;
        }
        .stat-unit {
            font-size: 20px;
            color: #56A596;
            font-weight: 600;
        }
    </style>
</head>
<body class="antialiased">
    <div id="content-sandbox" dir="rtl" class="flex flex-col justify-between items-center" style="gap: 24px;">
        
        <!-- Infographic Badge -->
        <div class="infographic-badge">
            <span>📊</span>
            <span>إنفوغرافيك</span>
        </div>

        <!-- Title -->
        <div class="w-full text-center">
            <h2 class="text-slate-900 text-4xl font-bold leading-[1.3]">__MAIN_HEADLINE__</h2>
            <p class="text-slate-500 text-xl mt-2">__SUB_HEADLINE__</p>
        </div>

        <!-- Stats Grid -->
        <div class="w-full grid grid-cols-2 gap-4 flex-1">
            <div class="stat-card flex flex-col items-center justify-center">
                <div class="stat-number">__STAT_1_VALUE__</div>
                <div class="stat-unit">__STAT_1_UNIT__</div>
                <div class="stat-label">__STAT_1_LABEL__</div>
            </div>
            <div class="stat-card flex flex-col items-center justify-center">
                <div class="stat-number">__STAT_2_VALUE__</div>
                <div class="stat-unit">__STAT_2_UNIT__</div>
                <div class="stat-label">__STAT_2_LABEL__</div>
            </div>
            <div class="stat-card flex flex-col items-center justify-center">
                <div class="stat-number">__STAT_3_VALUE__</div>
                <div class="stat-unit">__STAT_3_UNIT__</div>
                <div class="stat-label">__STAT_3_LABEL__</div>
            </div>
            <div class="stat-card flex flex-col items-center justify-center">
                <div class="stat-number">__STAT_4_VALUE__</div>
                <div class="stat-unit">__STAT_4_UNIT__</div>
                <div class="stat-label">__STAT_4_LABEL__</div>
            </div>
        </div>

        <!-- Source -->
        <div class="w-full text-center text-lg text-slate-400">__SOURCE_TEXT__</div>
    </div>
</body>
</html>
